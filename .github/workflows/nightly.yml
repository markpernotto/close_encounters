name: Nightly pipeline

on:
  schedule:
    - cron: '30 6 * * *'   # 06:30 UTC daily
  workflow_dispatch:        # manual trigger from the Actions tab

concurrency:
  group: nightly
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write   # commit MANIFEST.jsonl + public/ feeds back to main
      issues: write     # open an issue on failure

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      # dbt's DBT_* connection vars are derived from DATABASE_URL at runtime
      # (see the "Derive dbt connection" step) — one source of truth, no
      # duplicate secrets to drift out of sync.
      DBT_SCHEMA: public
      USER_AGENT_PROJECT: 'neo_citation/0.1 (+https://github.com/markpernotto/close_encounters)'
      USER_AGENT_EMAIL: ${{ secrets.USER_AGENT_EMAIL }}
      NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
      ADS_API_TOKEN: ${{ secrets.ADS_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply schema (idempotent)
        env:
          PGPASSWORD_SOURCE: ${{ secrets.DATABASE_URL }}
        run: psql "$DATABASE_URL" -f etl/schema.sql

      - name: Extract CNEOS + SBDB → R2 + Postgres
        # etl.extract performs the full extract → R2 upload → Postgres UPSERT
        # cycle and updates data/MANIFEST.jsonl.
        run: python -m etl.extract

      - name: Diff snapshots into approach_events
        run: python -m etl.diff

      - name: Evaluate alert rules
        # Fully idempotent on rule_id + event_dedup_key.
        run: python -m etl.alerts

      - name: Derive dbt connection from DATABASE_URL
        # profiles.yml reads discrete DBT_* env vars; split the single
        # DATABASE_URL into them so there's no second copy of the credentials
        # to drift (the missing DBT_PORT secret silently broke the marts).
        # The password only ever lands in $GITHUB_ENV, never the logs.
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import os, urllib.parse as up
          u = up.urlparse(os.environ["DATABASE_URL"])
          print(f"DBT_HOST={u.hostname or ''}")
          print(f"DBT_USER={u.username or ''}")
          print(f"DBT_PASSWORD={up.unquote(u.password or '')}")
          print(f"DBT_PORT={u.port or 5432}")
          print(f"DBT_DBNAME={(u.path or '').lstrip('/').split('?')[0]}")
          PY

      - name: dbt snapshot (SCD-2 history)
        # Closes valid_to on the prior dim_object row when tracked
        # attributes change between snapshots; inserts a new versioned
        # row otherwise. NOT continue-on-error: the API + detail pages now
        # read from the marts, so a failure here must fail the run (and open
        # an issue) rather than silently serve stale marts.
        run: cd etl/transform && DBT_PROFILES_DIR=. dbt snapshot

      - name: dbt run (refresh marts + staging views)
        # The API reads mart_objects_current / mart_*_approaches, so the marts
        # must rebuild every night or new objects 404 on their detail pages.
        # Hard-fail if this breaks.
        run: cd etl/transform && DBT_PROFILES_DIR=. dbt run

      - name: dbt test (schema validation)
        # A data-quality test failure shouldn't block publishing already-built
        # marts, so this one stays non-blocking.
        continue-on-error: true
        run: cd etl/transform && DBT_PROFILES_DIR=. dbt test

      - name: Publish RSS + JSON feeds
        run: python -m etl.publish

      - name: Resolve citation graph (MPEC + ADS)
        # Phase 3 — runs after publish so a citation-fetch hiccup doesn't
        # block the public feeds. ADS tier is skipped automatically when
        # ADS_API_TOKEN isn't configured. continue-on-error so a single
        # bad fetch doesn't fail the workflow.
        continue-on-error: true
        run: python -m etl.resolve_citations

      - name: Commit manifest + feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/MANIFEST.jsonl public/
          if git diff --staged --quiet; then
            echo "No changes to commit (likely a re-run on the same snapshot date)."
          else
            git commit -m "chore(nightly): update snapshot $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly pipeline failed — ${today}`,
              body: [
                'The nightly extract → load → diff → alerts → publish pipeline failed.',
                '',
                `**Run:** ${runUrl}`,
                '',
                'Check the workflow logs for the failing step.',
              ].join('\n'),
              labels: ['ops', 'nightly-failure'],
            });
