name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: neo_citation
          POSTGRES_PASSWORD: neo_citation
          POSTGRES_DB: neo_citation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U neo_citation"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply schema
        env:
          PGPASSWORD: neo_citation
        run: psql -h localhost -U neo_citation -d neo_citation_test -f etl/schema.sql

      - name: Lint
        run: ruff check .

      - name: Test
        env:
          DATABASE_URL: postgresql://neo_citation:neo_citation@localhost:5432/neo_citation_test
        run: pytest
